<!DOCTYPE html>
<html lang="ru">

<head>

  <!-- *GM: распечатать на розовой бумаге А4 landscape поля 10 мм, разрезать по 4 ассигнации.
       Двусторонняя печать: страница 2 — серый штамп "ТЫСЯЧА" на обороте (все 4 ячейки одинаковы,
       поэтому совмещение с лицевой стороной не зависит от направления переворота листа).* -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">

  <style>
    @page {
      size: A4 landscape;
      margin: 10mm;
    }

    html,
    body {
      margin: 0;
    }

    .page {
      width: 277mm;
      height: 189mm;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0mm;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5pt dashed #aaa;
      overflow: hidden;
    }

    .cell.plain {
      border: none;
    }

    .cell img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .stamp {
      width: 70%;
      padding: 10mm 0;
      background: #f2f2f2;
      color: #fff;
      text-align: center;
      font-family: "Old Standard TT", Georgia, serif;
      font-weight: 700;
      font-style: italic;
      font-size: 15mm;
      letter-spacing: 0.06em;
      box-sizing: border-box;
    }

    @media print {
      .page {
        page-break-after: always;
      }

      .page:last-child {
        page-break-after: auto;
      }
    }

    @media screen {
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .page+.page {
        margin-top: 8mm;
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="grid">
      <div class="cell"><img src="Ассигнацiя 1000 рублей.png" alt="1000 руб."></div>
      <div class="cell"><img src="Ассигнацiя 1000 рублей.png" alt="1000 руб."></div>
      <div class="cell"><img src="Ассигнацiя 1000 рублей.png" alt="1000 руб."></div>
      <div class="cell"><img src="Ассигнацiя 1000 рублей.png" alt="1000 руб."></div>
    </div>
  </div>

  <div class="page">
    <div class="grid">
      <div class="cell plain"><span class="stamp">ТЫСЯЧА</span></div>
      <div class="cell plain"><span class="stamp">ТЫСЯЧА</span></div>
      <div class="cell plain"><span class="stamp">ТЫСЯЧА</span></div>
      <div class="cell plain"><span class="stamp">ТЫСЯЧА</span></div>
    </div>
  </div>
</body>

</html>
